<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Diagram Primitive Test Deck</title>
<style>
:root {
  --font-display: "Source Sans 3", sans-serif;
  --font-body: "Source Sans 3", sans-serif;
  --font-sans: "Source Sans 3", "IBM Plex Sans", sans-serif;
  --color-primary: #00175a;
  --color-primary-mid: #002060;
  --color-accent: #006fcf;
  --color-ink: #53565a;
  --color-ink-muted: #63666a;
  --color-ink-on-primary: #ffffff;
  --color-surface: #ffffff;
  --color-surface-soft: #f8f8f8;
  --space-md: 18px;
}
body { font-family: var(--font-body); background: #f0f0f0; padding: 40px; }
.test-stage { background: var(--color-surface); border-radius: 16px; padding: var(--space-md); margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
h2 { margin-top: 0; color: var(--color-primary); font-size: 20px; }
svg { display: block; margin: 0 auto; }
</style>
</head>
<body>

<!-- SVG Sprite from renderer_v2 -->
<svg class="svg-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <symbol id="ic-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>
  </symbol>
  <symbol id="ic-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
  </symbol>
  <symbol id="ic-flow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
  </symbol>
</svg>

<!-- Node Box Test -->
<div class="test-stage">
<h2>1. Node Box</h2>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <svg class="node-icon" viewBox="0 0 24 24" aria-hidden="true" x="12" y="18" width="24" height="24">
      <use href="#ic-globe" stroke="var(--color-primary)"/>
    </svg>
    <text x="48" y="26" fill="var(--color-ink)" font-size="14px" font-weight="600" font-family="var(--font-body)">Gateway</text>
    <text x="48" y="38" fill="var(--color-ink-muted)" font-size="12px" font-family="var(--font-body)">API entry point</text>
  </g>
  <g transform="translate(200, 30)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <text x="16" y="34" fill="var(--color-ink)" font-size="14px" font-weight="600" font-family="var(--font-body)">Database</text>
  </g>
</svg>
</div>

<!-- Arrow Connector Test -->
<div class="test-stage">
<h2>2. Arrow Connector</h2>
<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <g class="diagram-arrow">
    <path d="M 20 50 L 180 50" stroke="var(--color-accent)" stroke-width="2" fill="none"/>
    <polygon points="180,50 172,46 172,54" fill="var(--color-accent)"/>
  </g>
  <text x="200" y="30" fill="var(--color-ink-muted)" font-size="12px">Straight</text>
  <g class="diagram-arrow">
    <path d="M 20 80 Q 100 40 180 80" stroke="var(--color-accent)" stroke-width="2" fill="none"/>
    <polygon points="180,80 172,76 172,84" fill="var(--color-accent)"/>
  </g>
  <text x="200" y="85" fill="var(--color-ink-muted)" font-size="12px">Curved</text>
</svg>
</div>

<!-- Group Boundary Test -->
<div class="test-stage">
<h2>3. Group Boundary</h2>
<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <g class="diagram-group">
    <rect x="10" y="10" width="380" height="130" rx="12" fill="var(--color-surface-soft)" fill-opacity="0.35" stroke="var(--color-primary-mid)" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="22" y="28" fill="var(--color-primary-mid)" font-size="12px" font-weight="600" font-family="var(--font-body)">Microservices Layer</text>
  </g>
</svg>
</div>

<!-- Annotation Callout Test -->
<div class="test-stage">
<h2>4. Annotation Callout</h2>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <line x1="50" y1="30" x2="150" y2="80" stroke="var(--color-accent)" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="50" y="30" width="200" height="40" rx="6" fill="var(--color-accent)" fill-opacity="0.9"/>
  <foreignObject x="58" y="38" width="184" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:var(--color-ink-on-primary);font-size:12px;font-family:var(--font-body);line-height:1.3;">
      Latency: &lt; 50ms at p99
    </div>
  </foreignObject>
</svg>
</div>

<!-- Integration: All Primitives Together -->
<div class="test-stage">
<h2>5. Integration — System Architecture</h2>
<svg width="720" height="320" viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Group: Client Layer -->
  <g class="diagram-group">
    <rect x="10" y="10" width="220" height="120" rx="12" fill="var(--color-surface-soft)" fill-opacity="0.35" stroke="var(--color-primary-mid)" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="22" y="28" fill="var(--color-primary-mid)" font-size="12px" font-weight="600" font-family="var(--font-body)">Client Layer</text>
  </g>
  <!-- Node: Mobile Client -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <text x="16" y="30" fill="var(--color-ink)" font-size="14px" font-weight="600" font-family="var(--font-body)">Mobile App</text>
  </g>

  <!-- Arrow to Gateway -->
  <g class="diagram-arrow">
    <path d="M 250 75 L 310 75" stroke="var(--color-accent)" stroke-width="2" fill="none"/>
    <polygon points="310,75 302,71 302,79" fill="var(--color-accent)"/>
  </g>

  <!-- Node: Gateway -->
  <g transform="translate(320, 45)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <svg x="12" y="18" width="24" height="24" viewBox="0 0 24 24"><use href="#ic-globe" stroke="var(--color-primary)"/></svg>
    <text x="48" y="26" fill="var(--color-ink)" font-size="14px" font-weight="600" font-family="var(--font-body)">Gateway</text>
    <text x="48" y="42" fill="var(--color-ink-muted)" font-size="12px" font-family="var(--font-body)">Auth + Rate Limit</text>
  </g>

  <!-- Arrow to Services -->
  <g class="diagram-arrow">
    <path d="M 500 75 Q 550 40 580 75" stroke="var(--color-accent)" stroke-width="2" fill="none"/>
    <polygon points="580,75 572,71 572,79" fill="var(--color-accent)"/>
  </g>

  <!-- Group: Services Layer -->
  <g class="diagram-group">
    <rect x="580" y="10" width="130" height="120" rx="12" fill="var(--color-surface-soft)" fill-opacity="0.35" stroke="var(--color-primary-mid)" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="592" y="28" fill="var(--color-primary-mid)" font-size="12px" font-weight="600" font-family="var(--font-body)">Services</text>
  </g>
  <!-- Node: Orders Service -->
  <g transform="translate(595, 50)">
    <rect x="0" y="0" width="100" height="50" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <text x="16" y="30" fill="var(--color-ink)" font-size="13px" font-weight="600" font-family="var(--font-body)">Orders</text>
  </g>

  <!-- Annotation -->
  <line x1="400" y1="150" x2="400" y2="220" stroke="var(--color-accent)" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="330" y="220" width="140" height="40" rx="6" fill="var(--color-accent)" fill-opacity="0.9"/>
  <foreignObject x="338" y="228" width="124" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:var(--color-ink-on-primary);font-size:12px;font-family:var(--font-body);line-height:1.3;">
      Scales to 10K req/s
    </div>
  </foreignObject>

  <!-- Group: Data Layer -->
  <g class="diagram-group">
    <rect x="200" y="200" width="320" height="80" rx="12" fill="var(--color-surface-soft)" fill-opacity="0.35" stroke="var(--color-primary-mid)" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="212" y="218" fill="var(--color-primary-mid)" font-size="12px" font-weight="600" font-family="var(--font-body)">Data Layer</text>
  </g>
  <g transform="translate(230, 230)">
    <rect x="0" y="0" width="120" height="36" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <text x="16" y="23" fill="var(--color-ink)" font-size="13px" font-weight="600" font-family="var(--font-body)">PostgreSQL</text>
  </g>
  <g transform="translate(370, 230)">
    <rect x="0" y="0" width="120" height="36" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
    <text x="16" y="23" fill="var(--color-ink)" font-size="13px" font-weight="600" font-family="var(--font-body)">Redis Cache</text>
  </g>
</svg>
</div>

</body>
</html>
